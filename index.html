let months=[JSON.parse(JSON.stringify(MARCH)), JSON.parse(JSON.stringify(APRIL))];
let activeMonth=1, activeTab="reklamace", showUpload=false;

let viewMode='month';

const pct=(v,t)=>t?Math.round(v/t*100):0;

function aggregateAll(){
  const all=JSON.parse(JSON.stringify(months[0]));
  all.label='Všechny měsíce'; all.short='Celkem'; all.period=months.map(m=>m.short).join(' + ');
  all.kpi={total:0,pos:0,neu:0,neg:0,por:0};
  months.forEach(m=>{all.kpi.total+=m.kpi.total;});
  const tot=all.kpi.total||1;
  months.forEach(m=>{all.kpi.pos+=m.kpi.pos*(m.kpi.total/tot);all.kpi.neu+=m.kpi.neu*(m.kpi.total/tot);all.kpi.neg+=m.kpi.neg*(m.kpi.total/tot);all.kpi.por+=m.kpi.por*(m.kpi.total/tot);});
  all.kpi.pos=Math.round(all.kpi.pos);all.kpi.neu=Math.round(all.kpi.neu);all.kpi.neg=Math.round(all.kpi.neg);all.kpi.por=Math.round(all.kpi.por);
  all.sentiment=[{name:"Pozitivní",value:0},{name:"Neutrální",value:0},{name:"Negativní",value:0}];
  months.forEach(m=>m.sentiment.forEach((s,i)=>{all.sentiment[i].value+=s.value;}));
  const catMap={};
  months.forEach(m=>(m.cats||[]).forEach(c=>{catMap[c.name]=(catMap[c.name]||0)+c.n;}));
  all.cats=Object.entries(catMap).sort((a,b)=>b[1]-a[1]).map(([name,n])=>({name,n}));
  const czMap={};
  months.forEach(m=>(m.czsk||[]).forEach(x=>{czMap[x.name]=(czMap[x.name]||0)+x.total;}));
  const czTot=Object.values(czMap).reduce((s,v)=>s+v,0)||1;
  all.czsk=Object.entries(czMap).map(([name,total])=>({name,total,pct:Math.round(total/czTot*100)}));
  all.weekly=months.flatMap(m=>(m.weekly||[]).map(w=>({...w,w:m.short+' '+w.w})));
  // reklamace — merge sekce
  const sekceMap={};
  months.forEach(m=>{
    (m.reklamace?.sekce||[]).forEach(s=>{
      if(!sekceMap[s.id]) sekceMap[s.id]={...JSON.parse(JSON.stringify(s)),count:0};
      sekceMap[s.id].count+=s.count;
      // merge byType
      s.byType.forEach(t=>{
        const ex=sekceMap[s.id].byType.find(x=>x.name===t.name);
        if(ex) ex.count+=t.count;
        else sekceMap[s.id].byType.push({...t});
      });
      // merge byAgent
      s.byAgent.forEach(a=>{
        const ex=sekceMap[s.id].byAgent.find(x=>x.name===a.name);
        if(ex){ex.total+=a.total;ex.cases=[...ex.cases,...a.cases];}
        else sekceMap[s.id].byAgent.push(JSON.parse(JSON.stringify(a)));
      });
    });
  });
  all.reklamace={
    total:months.reduce((s,m)=>s+(m.reklamace?.total||0),0),
    sekce:Object.values(sekceMap)
  };
  all.problémy=months.flatMap(m=>m.problémy||[]);
  return all;
}

function getActiveData(){
  return viewMode==='all'?aggregateAll():months[activeMonth];
}

function dc(){Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}});charts={};}

function render(){
  dc();
  const D=getActiveData();
  document.getElementById('app').innerHTML=html(D);
  bind(D);
  setTimeout(()=>buildCharts(D),80);
}

// ── PŘEHLED ──────────────────────────────────────────────────
function tabPrehled(D){return`
<div class="kpis">
  ${[{l:"Celkem interakcí",v:D.kpi.total.toLocaleString('cs'),c:"#5b6ef5"},{l:"Pozitivní",v:D.kpi.pos+' %',c:"#0F6E56"},{l:"Neutrální",v:D.kpi.neu+' %',c:"#73726c"},{l:"Negativní",v:D.kpi.neg+' %',c:"#A32D2D"},{l:"Poradenství",v:D.kpi.por+' %',c:"#854F0B"}].map(k=>`<div class="kpi" style="border-top-color:${k.c}"><div class="kpi-num" style="color:${k.c}">${k.v}</div><div class="kpi-lbl">${k.l}</div></div>`).join('')}
</div>
<div class="g2">
  <div class="card"><div class="ctitle">Hlavní kategorie</div><div style="position:relative;width:100%;height:${D.cats.length*30+20}px"><canvas id="cc"></canvas></div></div>
  <div>
    <div class="card" style="margin-bottom:14px">
      <div class="ctitle">Sentiment</div>
      <div class="legend">${D.sentiment.map(s=>`<span style="display:flex;align-items:center;gap:5px"><span class="legend-dot" style="background:${SC[s.name]}"></span>${s.name} ${pct(s.value,D.kpi.total)} %</span>`).join('')}</div>
      <div style="position:relative;width:100%;height:160px"><canvas id="cs"></canvas></div>
    </div>
    <div class="card">
      <div class="ctitle">CZ vs SK</div>
      ${D.czsk.map((x,i)=>`<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px"><span style="font-weight:600">${x.name}</span><span style="color:#6b7280">${x.total.toLocaleString('cs')} (${x.pct} %)</span></div><div class="mini-track"><div class="mini-fill" style="width:${x.pct}%;background:${P[i]}"></div></div></div>`).join('')}
    </div>
  </div>
</div>
${D.weekly.length?`<div class="card"><div class="ctitle">Týdenní objem</div><div style="position:relative;width:100%;height:120px"><canvas id="cw"></canvas></div></div>`:''}`;}

// ── TRENDY ───────────────────────────────────────────────────
function tabTrendy(D){return`
${months.length>1?`<div style="background:rgba(91,110,245,.1);border:1px solid rgba(91,110,245,.2);border-radius:10px;padding:12px 14px;margin-bottom:14px;font-size:12px;color:#5b6ef5">📈 Máš ${months.length} měsíce — meziměsíční srovnání níže.</div>`:''}
${D.weekly.length?`<div class="card"><div class="ctitle">Vývoj sentimentu — týdně</div><div class="legend"><span style="display:flex;align-items:center;gap:5px"><span class="legend-dot" style="background:#0F6E56"></span>Pozitivní</span><span style="display:flex;align-items:center;gap:5px"><span class="legend-dot" style="background:#5b6ef5"></span>Neutrální</span><span style="display:flex;align-items:center;gap:5px"><span class="legend-dot" style="background:#A32D2D"></span>Negativní</span></div><div style="position:relative;width:100%;height:240px"><canvas id="cst"></canvas></div></div>`:''}
<div class="g2eq">
  <div class="card"><div class="ctitle">Kategorie — týdně</div><div style="position:relative;width:100%;height:200px"><canvas id="cct"></canvas></div></div>
  <div class="card"><div class="ctitle">Celkový objem</div><div style="position:relative;width:100%;height:200px"><canvas id="cvt"></canvas></div></div>
</div>
${months.length>1?`<div class="card"><div class="ctitle">Meziměsíční srovnání — reklamace</div><div style="position:relative;width:100%;height:150px"><canvas id="cm"></canvas></div></div>`:''}`;}

// ── OBJEDNÁVKY ───────────────────────────────────────────────
function tabObj(D){
  if(!D.objednavky||D.objednavky.length===0) return`<div class="card" style="text-align:center;padding:40px;color:#6b7280"><div style="font-size:24px;margin-bottom:12px">📦</div><div style="font-size:14px;font-weight:600;margin-bottom:6px">Objednávková data nejsou k dispozici</div><div style="font-size:12px">Pro tento měsíc nebyl nahrán hovorový ani emailový export s objednávkovými dotazy.</div></div>`;
  const total=D.objednavky.reduce((s,o)=>s+o.count,0);
  return`
<div class="kpis" style="grid-template-columns:repeat(3,1fr)">
  <div class="kpi" style="border-top-color:#5b6ef5"><div class="kpi-num" style="color:#5b6ef5">${total}</div><div class="kpi-lbl">Objednávkové dotazy celkem</div></div>
  <div class="kpi" style="border-top-color:#854F0B"><div class="kpi-num" style="color:#854F0B;font-size:16px">${D.objednavky[0].name}</div><div class="kpi-lbl" style="margin-top:8px">Nejčastější téma</div></div>
  <div class="kpi" style="border-top-color:#0F6E56"><div class="kpi-num" style="color:#0F6E56">${D.objednavky.length}</div><div class="kpi-lbl">Kategorií</div></div>
</div>
<div style="font-size:12px;color:#6b7280;margin-bottom:12px">Kliknutím na téma zobrazíš nejčastější dotazy a důvody kontaktu</div>
${D.objednavky.map(o=>{
  const open=openObj===o.name;
  const max=D.objednavky[0].count;
  return`<div class="exp-row${open?' open':''}">
    <button class="exp-hdr" data-obj="${o.name}">
      <div style="display:flex;align-items:center;gap:10px;flex:1">
        <div style="width:8px;height:8px;border-radius:50%;background:${o.color};flex-shrink:0"></div>
        <div><div style="font-weight:600;font-size:13px;color:#1a1d2e">${o.name}</div>${open?'':` <div style="font-size:11px;color:#6b7280;margin-top:2px">${o.desc}</div>`}</div>
      </div>
      <div style="display:flex;align-items:center;gap:12px;flex-shrink:0">
        <div style="text-align:right"><div style="font-size:22px;font-weight:600;color:${o.color}">${o.count}×</div><div style="width:80px"><div class="mini-track" style="margin-top:4px"><div class="mini-fill" style="width:${pct(o.count,max)}%;background:${o.color}"></div></div></div></div>

  </div>`;}).join('')}`;}

// ── PORADENSTVÍ ──────────────────────────────────────────────
function tabPor(D){
  if(!D.poradenstvi||D.poradenstvi.length===0) return`<div class="card" style="text-align:center;padding:40px;color:#6b7280"><div style="font-size:24px;margin-bottom:12px">💬</div><div style="font-size:14px;font-weight:600;margin-bottom:6px">Poradenská data nejsou k dispozici</div><div style="font-size:12px">Pro tento měsíc nebyl nahrán hovorový ani emailový export s poradenskými dotazy.</div></div>`;
  let detailHtml=`<div class="detail-panel" style="display:flex;align-items:center;justify-content:center;color:#9ca3af;font-size:13px;text-align:center">← Vyber téma a podtéma<br>pro zobrazení konkrétních otázek</div>`;
  if(openPor&&openSub){const por=D.poradenstvi.find(p=>p.name===openPor);const sub=por?.subs.find(s=>s.name===openSub);if(sub){detailHtml=`<div class="detail-panel"><div style="font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px">${openPor}</div><div style="font-size:14px;font-weight:600;color:#1a1d2e;margin-bottom:4px">${sub.name}</div><div style="font-size:12px;color:#5b6ef5;margin-bottom:14px">${sub.count} dotazů / měsíc</div><div class="ctitle">Konkrétní otázky zákazníků</div>${sub.questions.map(q=>`<div class="q-item"><div class="q-bullet"></div><span>${q}</span></div>`).join('')}</div>`;}}
  return`
<div class="g3">${[{l:"Poradenství celkem",v:"1 121",sub:"CZ: 1 059 · SK: 62",c:"#5b6ef5"},{l:"Podíl z celku",v:"44 %",sub:"Největší kategorie",c:"#854F0B"},{l:"Sentiment",v:"~90 % pozitivní",sub:"Zákazníci spokojeni",c:"#0F6E56"}].map(k=>`<div class="kpi" style="border-top-color:${k.c}"><div class="kpi-num" style="color:${k.c};font-size:22px">${k.v}</div><div style="font-size:12px;font-weight:600;color:#1a1d2e;margin-top:5px">${k.l}</div><div style="font-size:11px;color:#6b7280;margin-top:2px">${k.sub}</div></div>`).join('')}</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
  <div><div class="card"><div class="ctitle">Témata → klikni na podtéma pro detail</div>
  ${D.poradenstvi.map(p=>{const open=openPor===p.name;return`<div class="exp-row${open?' open':''}"><button class="exp-hdr" data-por="${p.name}"><div style="display:flex;align-items:center;gap:8px;flex:1"><div style="width:16px;height:3px;border-radius:99px;background:${p.color};flex-shrink:0"></div><span style="font-size:12px;color:#1a1d2e">${p.name}</span></div><div style="display:flex;align-items:center;gap:6px"><span style="font-size:13px;font-weight:600;color:${p.color}">${p.count}</span><span style="color:#6b7280;font-size:12px">${open?'▲':'▼'}</span></div></button>${open?`<div class="exp-body">${p.subs.map(s=>{const isSel=openSub===s.name;return`<div class="sub-exp${isSel?' open':''}"><button class="sub-hdr" data-sub="${s.name}"><span style="font-size:12px;color:${isSel?p.color:'#6b7280'};font-weight:${isSel?'600':'400'}">${s.name}</span><span style="font-size:12px;font-weight:600;color:${p.color}">${s.count}×</span></button></div>`;}).join('')}</div>`:''}</div>`;}).join('')}
  </div></div>
  <div>${detailHtml}</div>
</div>`;}

// ── REKLAMACE (nová verze s sekcemi) ─────────────────────────
function tabRek(D){
  const R=D.reklamace;
  const sekce=R.sekce||[];
  const curSek=sekce.find(s=>s.id===activeSekce)||sekce[0];

  const typColors={"Rozbitý produkt":"#A32D2D","Chybí produkt":"#854F0B","Odeslán jiný produkt":"#634ABF","Poškozený obal":"#185FA5","Poškozený/jiný obal":"#185FA5","Špatná klec":"#5b6ef5","Ostatní":"#73726c","Jiné":"#888780"};

  return`
<div class="g4">
  <div class="kpi" style="border-top-color:#A32D2D"><div class="kpi-num" style="color:#A32D2D">${R.total}</div><div class="kpi-lbl">Reklamací celkem</div></div>
  ${sekce.slice(0,3).map(s=>`<div class="kpi" style="border-top-color:${s.color}"><div class="kpi-num" style="color:${s.color}">${s.count}</div><div class="kpi-lbl">${s.label}</div></div>`).join('')}
</div>

<div class="sek-tabs">
  ${sekce.map(s=>`<button class="sek-tab${activeSekce===s.id?' active':''}" data-sek="${s.id}">${s.label} <span style="font-size:10px;opacity:.8">${s.count}×</span></button>`).join('')}
</div>

${curSek?`
<div class="g2eq">
  <div class="card">
    <div class="ctitle">Typy — ${curSek.label}</div>
    ${curSek.byType.length?`<div style="position:relative;width:100%;height:${Math.max(curSek.byType.length*34+20,100)}px"><canvas id="crt"></canvas></div>`:`<div style="color:#6b7280;font-size:12px;padding:20px 0">Detailní data nejsou k dispozici</div>`}

  <div class="card">
    <div class="ctitle">Rozložení</div>
    ${curSek.byType.length?`<div style="position:relative;width:100%;height:220px"><canvas id="crp"></canvas></div>`:`<div style="color:#6b7280;font-size:12px;padding:20px 0">—</div>`}

${curSek.notes&&curSek.notes.length?`
<div class="card"><div class="ctitle">Doporučené akce — ${curSek.label}</div>
${curSek.notes.map(n=>`<div class="issue-card" style="background:${n.color}0d;border-left-color:${n.color};margin-bottom:8px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap"><span style="font-size:9px;padding:2px 8px;border-radius:4px;background:${n.color}22;color:${n.color};font-weight:700">${n.level}</span><span style="font-size:13px;font-weight:600;color:#1a1d2e">${n.title}</span></div><div style="font-size:11px;color:#6b7280;margin-bottom:5px">${n.desc}</div><span style="font-size:11px;color:#5b6ef5;background:rgba(91,110,245,.08);border-radius:4px;padding:3px 8px">→ ${n.action}</span></div>`).join('')}
</div>`:''}

${curSek.byAgent&&curSek.byAgent.length?`
<div class="card"><div class="ctitle">Chybovost podle agenta (sklad) — klikni pro detail případů</div>
${curSek.byAgent.map((a,i)=>{
  const open=openAgent===a.name;
  const typCounts={};
  (a.cases||[]).forEach(c=>{typCounts[c.typ]=(typCounts[c.typ]||0)+1;});
  return`<div class="exp-row${open?' open':''}">
    <button class="exp-hdr" data-agent="${a.name}">
      <div style="display:flex;align-items:center;gap:12px;flex:1">
        <div style="width:28px;height:28px;border-radius:50%;background:${P[i%P.length]}22;color:${P[i%P.length]};font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">${i+1}</div>
        <div><div style="font-weight:600;font-size:13px;color:#1a1d2e">${a.name}</div>
        <div style="display:flex;gap:6px;margin-top:4px;flex-wrap:wrap">${Object.entries(typCounts).map(([typ,cnt])=>`<span style="font-size:10px;padding:1px 7px;border-radius:4px;background:${typColors[typ]||'#73726c'}22;color:${typColors[typ]||'#73726c'}">${typ} ${cnt}×</span>`).join('')}</div></div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
        <div style="text-align:right"><div style="font-size:22px;font-weight:700;color:${P[i%P.length]}">${a.total}</div><div style="font-size:10px;color:#6b7280">případů</div></div>
        <span style="color:#6b7280">${open?'▲':'▼'}</span>
      </div>
    </button>
    ${open?`<div class="exp-body"><table class="agent-tbl" style="font-size:11px"><thead><tr><th>#</th><th>Č. objednávky</th><th>Typ chyby</th><th>Detail</th></tr></thead><tbody>${(a.cases||[]).map((c,j)=>`<tr><td style="color:#6b7280">${j+1}</td><td style="font-family:monospace;color:#5b6ef5">${c.objednavka||'—'}</td><td><span style="font-size:10px;padding:2px 7px;border-radius:4px;background:${typColors[c.typ]||'#73726c'}22;color:${typColors[c.typ]||'#73726c'}">${c.typ}</span></td><td style="color:#6b7280">${c.detail||'—'}</td></tr>`).join('')}</tbody></table></div>`:''}
  </div>`;}).join('')}
</div>`:''}
`:''}`;
}

// ── PROBLÉMY ─────────────────────────────────────────────────

  if(s==='progress')return`<span class="meta-pill st-progress">V řešení</span>`;
  return`<span class="meta-pill st-done">Vyřešeno</span>`;
}

// ── CHARTS ───────────────────────────────────────────────────
function buildCharts(D){
  const gc='rgba(0,0,0,.06)',tc='#6b7280';
  const base={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'#fff',titleColor:'#1a1d2e',bodyColor:'#6b7280',borderColor:'#e2e5ef',borderWidth:1}}};
  const g=id=>document.getElementById(id);

  if(activeTab==="přehled"){
    const ce=g('cc');if(ce&&D.cats.length)charts.c=new Chart(ce,{type:'bar',data:{labels:D.cats.map(c=>c.name),datasets:[{data:D.cats.map(c=>c.n),backgroundColor:D.cats.map((_,i)=>P[i%P.length]),borderRadius:4,borderSkipped:false}]},options:{...base,indexAxis:'y',scales:{x:{grid:{color:gc},ticks:{color:tc,font:{size:11}}},y:{grid:{display:false},ticks:{color:tc,font:{size:11}}}}}});
    const se=g('cs');if(se)charts.s=new Chart(se,{type:'doughnut',data:{labels:D.sentiment.map(s=>s.name),datasets:[{data:D.sentiment.map(s=>s.value),backgroundColor:D.sentiment.map(s=>SC[s.name]),borderWidth:0,hoverOffset:4}]},options:{...base,cutout:'60%'}});
    const we=g('cw');if(we&&D.weekly.length)charts.w=new Chart(we,{type:'bar',data:{labels:D.weekly.map(w=>w.w),datasets:[{data:D.weekly.map(w=>w.total),backgroundColor:'#5b6ef5',borderRadius:4}]},options:{...base,scales:{x:{grid:{display:false},ticks:{color:tc,font:{size:11}}},y:{grid:{color:gc},ticks:{color:tc,font:{size:11}}}}}});
  }
  if(activeTab==="trendy"){
    const allW=D.weekly||[];
    if(allW.length){
      const st=g('cst');if(st)charts.st=new Chart(st,{type:'line',data:{labels:allW.map(w=>w.w),datasets:[{label:'Pozitivní',data:allW.map(w=>w.pos),borderColor:'#0F6E56',backgroundColor:'transparent',tension:.4,pointRadius:4},{label:'Neutrální',data:allW.map(w=>w.neu),borderColor:'#5b6ef5',backgroundColor:'transparent',tension:.4,pointRadius:4},{label:'Negativní',data:allW.map(w=>w.neg),borderColor:'#A32D2D',backgroundColor:'transparent',tension:.4,pointRadius:4}]},options:{...base,scales:{x:{grid:{display:false},ticks:{color:tc,font:{size:11}}},y:{grid:{color:gc},ticks:{color:tc,font:{size:11}}}}}});
    }
    const cw=g('cct');if(cw)charts.cw=new Chart(cw,{type:'bar',data:{labels:allW.map(w=>w.w)||months.map(m=>m.short),datasets:[{label:'Poradenství',data:allW.map(w=>w.por)||[],backgroundColor:'#5b6ef5'},{label:'Objednávky',data:allW.map(w=>w.obj)||[],backgroundColor:'#0F6E56'},{label:'Reklamace',data:allW.map(w=>w.rek)||[],backgroundColor:'#A32D2D'}]},options:{...base,scales:{x:{stacked:true,grid:{display:false},ticks:{color:tc,font:{size:11}}},y:{stacked:true,grid:{color:gc},ticks:{color:tc,font:{size:11}}}}}});
    const vw=g('cvt');if(vw)charts.vw=new Chart(vw,{type:'bar',data:{labels:months.map(m=>m.short),datasets:[{data:months.map(m=>m.kpi.total||m.reklamace?.total||0),backgroundColor:months.map((_,i)=>P[i%P.length]),borderRadius:4}]},options:{...base,scales:{x:{grid:{display:false},ticks:{color:tc,font:{size:11}}},y:{grid:{color:gc},ticks:{color:tc,font:{size:11}}}}}});
    const me=g('cm');if(me)charts.me=new Chart(me,{type:'bar',data:{labels:months.map(m=>m.short),datasets:[{label:'Reklamace',data:months.map(m=>m.reklamace?.total||0),backgroundColor:months.map((_,i)=>P[i%P.length]),borderRadius:4}]},options:{...base,scales:{x:{grid:{display:false},ticks:{color:tc,font:{size:11}}},y:{grid:{color:gc},ticks:{color:tc,font:{size:11}}}}}});
  }
  if(activeTab==="reklamace"){
    const R=D.reklamace;
    const curSek=(R.sekce||[]).find(s=>s.id===activeSekce)||(R.sekce||[])[0];
    if(curSek&&curSek.byType.length){
      const rt=g('crt');if(rt)charts.rt=new Chart(rt,{type:'bar',data:{labels:curSek.byType.map(t=>t.name),datasets:[{data:curSek.byType.map(t=>t.count),backgroundColor:curSek.byType.map(t=>t.color),borderRadius:4,borderSkipped:false}]},options:{...base,indexAxis:'y',scales:{x:{grid:{color:gc},ticks:{color:tc,font:{size:11}}},y:{grid:{display:false},ticks:{color:tc,font:{size:11}}}}}});
      const rp=g('crp');if(rp)charts.rp=new Chart(rp,{type:'doughnut',data:{labels:curSek.byType.map(t=>t.name),datasets:[{data:curSek.byType.map(t=>t.count),backgroundColor:curSek.byType.map(t=>t.color),borderWidth:0,hoverOffset:4}]},options:{...base,cutout:'55%'}});
    }
  }
}

// ── EVENTS ───────────────────────────────────────────────────
function bind(D){
  document.querySelectorAll('.m-btn[data-mi]').forEach(b=>b.addEventListener('click',()=>{activeMonth=+b.dataset.mi;viewMode='month';render()}));
  const bva=document.getElementById('btn-viewall');
  if(bva)bva.addEventListener('click',()=>{viewMode='all';render()});
  document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>{activeTab=b.dataset.tab;openObj=null;openPor=null;openSub=null;openAgent=null;render()}));
  const bu=document.getElementById('btn-upload');
  if(bu)bu.addEventListener('click',()=>{showUpload=!showUpload;render()});
  const ba=document.getElementById('btn-am');
  if(ba)ba.addEventListener('click',addMonth);
  document.querySelectorAll('[data-sek]').forEach(b=>b.addEventListener('click',()=>{activeSekce=b.dataset.sek;openAgent=null;render()}));
  document.querySelectorAll('[data-agent]').forEach(b=>b.addEventListener('click',()=>{const n=b.dataset.agent;openAgent=openAgent===n?null:n;render()}));
  document.querySelectorAll('[data-obj]').forEach(b=>b.addEventListener('click',()=>{const n=b.dataset.obj;openObj=openObj===n?null:n;render()}));
  document.querySelectorAll('[data-por]').forEach(b=>b.addEventListener('click',()=>{const n=b.dataset.por;openPor=openPor===n?null:n;openSub=null;render()}));
  document.querySelectorAll('[data-sub]').forEach(b=>b.addEventListener('click',()=>{const n=b.dataset.sub;openSub=openSub===n?null:n;render()}));
  const uz=document.getElementById('uz'),fi=document.getElementById('fi');
  if(uz){uz.addEventListener('click',()=>fi.click());uz.addEventListener('dragover',e=>{e.preventDefault();uz.classList.add('drag')});uz.addEventListener('dragleave',()=>uz.classList.remove('drag'));uz.addEventListener('drop',e=>{e.preventDefault();uz.classList.remove('drag');loadFile(e.dataTransfer.files[0])});}
  if(fi)fi.addEventListener('change',e=>loadFile(e.target.files[0]));
}

function toggleDetail(id){const el=document.getElementById('det-'+id);if(el)el.style.display=el.style.display==='none'?'block':'none';}

function addComment(id){
  const ta=document.getElementById('cmt-'+id);
  if(!ta||!ta.value.trim())return;
  const D=getActiveData();
  const p=D.problémy.find(x=>x.id===id);
  if(!p)return;
  const now=new Date();
  p.comments.push({author:"Já",date:now.getDate()+'.'+(now.getMonth()+1)+'.'+now.getFullYear(),text:ta.value.trim()});
  render();setTimeout(()=>{toggleDetail(id);const det=document.getElementById('det-'+id);if(det)det.style.display='block';},50);
}

function editStatus(id){
  const D=getActiveData();
  const p=D.problémy.find(x=>x.id===id);
  if(!p)return;
  const opts=['open','progress','done'];
  p.status=opts[(opts.indexOf(p.status)+1)%3];
  render();
}

function openNewProblem(){
  const mr=document.getElementById('modal-root');
  mr.innerHTML=`<div class="modal-bg" id="mbg"><div class="modal"><h3>+ Přidat nový problém</h3><label>Název problému</label><input id="np-title" placeholder="např. Chybějící produkty ve skladu"><label>Závažnost</label><select id="np-level"><option value="KRITICKÉ">🔴 Kritické</option><option value="DŮLEŽITÉ" selected>🟡 Důležité</option><option value="SLEDOVAT">🟢 Sledovat</option></select><label>Frekvence</label><input id="np-freq" placeholder="např. 10× / měsíc"><label>Popis</label><textarea id="np-desc" placeholder="Co se děje?"></textarea><label>Navrhovaná akce</label><input id="np-action" placeholder="Kdo co udělá?"><label>Zodpovědná osoba / tým</label><input id="np-owner" placeholder="např. IT tým"><label>Fakta na stole (každé na nový řádek)</label><textarea id="np-facts" placeholder="Fakt 1&#10;Fakt 2"></textarea><div class="modal-btns"><button class="btn-secondary" onclick="closeModal()">Zrušit</button><button class="btn-primary" onclick="saveNewProblem()">Přidat</button></div></div></div>`;
  document.getElementById('mbg').addEventListener('click',e=>{if(e.target.id==='mbg')closeModal();});
}

function saveNewProblem(){
  const title=document.getElementById('np-title').value.trim();
  if(!title)return alert('Zadej název problému');
  const lvl=document.getElementById('np-level').value;
  const colors={KRITICKÉ:"#A32D2D",DŮLEŽITÉ:"#854F0B",SLEDOVAT:"#0F6E56"};
  const facts=document.getElementById('np-facts').value.split('\n').map(s=>s.trim()).filter(Boolean);
  const D=getActiveData();
  D.problémy.push({id:'p'+Date.now(),level:lvl,color:colors[lvl],title,freq:document.getElementById('np-freq').value||'?× / měsíc',desc:document.getElementById('np-desc').value,action:document.getElementById('np-action').value,owner:document.getElementById('np-owner').value||'Nezadáno',status:'open',facts,comments:[]});
  closeModal();render();
}

function closeModal(){document.getElementById('modal-root').innerHTML='';}

function addMonth(){
  const name=prompt('Název měsíce (např. Květen 2026):');
  if(!name)return;
  const short=name.split(' ').map(w=>w.slice(0,3)).join(' ');
  const blank=JSON.parse(JSON.stringify(MARCH));
  blank.label=name;blank.short=short;blank.period=name;
  blank.kpi={total:0,pos:0,neu:0,neg:0,por:0};blank.weekly=[];
  months.push(blank);activeMonth=months.length-1;showUpload=true;render();
}

function loadFile(file){
  if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    const text=e.target.result;
    // detect separator
    const firstLine=text.split(/\r?\n/)[0];
    const sep=firstLine.includes(';')?';':',';
    const lines=text.trim().split(/\r?\n/);
    const hdrs=lines[0].split(sep).map(h=>h.trim().replace(/^"|"$/g,''));
    const rows=lines.slice(1).filter(l=>l.trim()).map(line=>{
      const v=line.split(sep).map(x=>x.trim().replace(/^"|"$/g,''));
      const o={};hdrs.forEach((h,i)=>o[h]=v[i]||'');return o;
    });
    if(hdrs.includes('SKLAD')||hdrs.includes('DOPRAVCE')){
      // full export format
      const sekceIds=['sklad','dopravce','vyroba','nakup','jine'];
      const sekceLabels={sklad:'Sklad',dopravce:'Dopravce',vyroba:'Výroba',nakup:'Nákup',jine:'Jiné'};
      const sekceColors={sklad:'#A32D2D',dopravce:'#185FA5',vyroba:'#854F0B',nakup:'#3B6D11',jine:'#73726c'};
      const stitkyMap={sklad:'2. SKLAD',dopravce:'1. DOPRAVCE',vyroba:'3.VÝROBA',nakup:'7.NÁKUP',jine:'6. JINÉ'};
      const sekceData=sekceIds.map(id=>{
        const tag=stitkyMap[id];
        const filtered=rows.filter(r=>r['Štítky']&&r['Štítky'].includes(tag));
        const bt={};const ba={};
        filtered.forEach(row=>{
          const col=id==='sklad'?'SKLAD':id==='dopravce'?'DOPRAVCE':id==='vyroba'?'VÝROBA':id==='nakup'?'NÁKUP':'JINÉ';
          const typ=row[col]||'Ostatní';
          bt[typ]=(bt[typ]||0)+1;
          const ag=(row['AGENT']||'').trim().replace(/^l /,'').trim();
          if(ag&&id==='sklad'){
            if(!ba[ag])ba[ag]={total:0,cases:[]};
            ba[ag].total++;
            ba[ag].cases.push({id:row['Číslo Případu']||'',zakaznik:row['Jméno Zákazníka']||'',objednavka:row['Číslo Objednávky']||'',typ,detail:row['JINÉ']||''});
          }
        });
        const colors=["#A32D2D","#854F0B","#634ABF","#185FA5","#5b6ef5","#0F6E56","#73726c"];
        return{id,label:sekceLabels[id],count:filtered.length,color:sekceColors[id],byType:Object.entries(bt).sort((a,b)=>b[1]-a[1]).map(([name,count],i)=>({name,count,color:colors[i%colors.length]})),byAgent:Object.entries(ba).sort((a,b)=>b[1].total-a[1].total).map(([name,v])=>({name,total:v.total,cases:v.cases})),notes:[]};
      });
      months[activeMonth].reklamace={total:rows.length,sekce:sekceData};
      showUpload=false;activeTab='reklamace';activeSekce='sklad';render();
    } else if(hdrs.includes('Kategorie')||hdrs.includes('Celkem')){
      const row=rows[0]||{};
      months[activeMonth].kpi={total:+row['Celkem']||0,pos:+row['Pozitivní']||0,neu:+row['Neutrální']||0,neg:+row['Negativní']||0,por:+row['Poradenství %']||0};
      showUpload=false;alert('✓ KPI data načtena');render();
    } else {
      alert('Nepodporovaný formát. Dashboard očekává export z Daktely nebo KPI souhrn.');
    }
  };
  r.readAsText(file,'utf-8');
}

function downloadTemplate(){
  const csv=`Číslo případu,Jméno zákazníka,Číslo objednávky,Štítky,SKLAD,DOPRAVCE,VÝROBA,JINÉ,AGENT\n20261907,Zuzana Bittova,2026839163,2. SKLAD,Rozbitý produkt,,,sklo,Pavlína Laz\n20261905,Peter Varga,2026839015,1. DOPRAVCE,,Zásilkovna,,,\n20261904,Radovan Boba,2025830613,7.NÁKUP,,,,,`;
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='sablona-reklamace.csv';a.click();
}
