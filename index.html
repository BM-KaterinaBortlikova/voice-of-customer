                  <div style={{display:"flex",alignItems:"center",gap:12}}>
                    <div style={{width:10,height:10,borderRadius:99,background:q.color}}/>
                    <div style={{fontWeight:700,fontSize:14,color:"#f1f5f9"}}>{q.country==="CZ"?"🇨🇿":"🇸🇰"} {q.name}</div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:12}}>
                    <span style={{fontSize:22,fontWeight:800,color:q.color}}>{q.total.toLocaleString("cs")}</span>
                    <span style={{color:"#6b7280",fontSize:14}}>{open?"▲":"▼"}</span>
                  </div>
                </div>
                {open && (
                  <div style={{borderTop:"1px solid #1f2937"}}>
                    {q.topics.map((tp,i)=>(
                      <div key={i} style={{padding:"10px 20px",borderBottom:"1px solid #1f2937",display:"flex",alignItems:"center",gap:12}}>
                        <div style={{width:24,fontSize:12,color:"#475569",flexShrink:0,textAlign:"right"}}>#{i+1}</div>
                        <div style={{flex:1}}>
                          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                            <span style={{fontSize:13,color:"#e2e8f0"}}>{tp.t}</span>
                            <span style={{fontSize:13,fontWeight:700,color:q.color}}>{tp.n}×</span>
                          </div>
                          <div style={{height:4,background:"#1f2937",borderRadius:99,overflow:"hidden"}}>
                            <div style={{height:"100%",width:pct(tp.n,max)+"%",background:q.color,borderRadius:99}}/>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            );
          })}
        </>}

        {tab==="poradenství" && <>
          <div style={css.grid3}>
            {[{l:"Poradenství celkem",v:"1 121",sub:"CZ: 1 059 · SK: 62",c:"#818cf8"},{l:"Podíl z celku",v:"44 %",sub:"Největší kategorie",c:"#fbbf24"},{l:"Sentiment",v:"~90 % pozitivní",sub:"Zákazníci spokojeni",c:"#34d399"}].map(k=>(
              <div key={k.l} style={css.kpi}><div style={css.kpiNum(k.c)}>{k.v}</div><div style={{fontSize:12,color:"#e2e8f0",marginTop:4,fontWeight:600}}>{k.l}</div><div style={{fontSize:11,color:"#475569",marginTop:2}}>{k.sub}</div></div>
            ))}
          </div>
          <div style={css.grid2}>
            <div style={css.card}>
              <div style={css.cardTitle}>Podtémata — klikni pro detail</div>
              {POR_DETAIL.map((p,i)=>{
                const open=openPor===p.name;
                return (
                  <div key={p.name} style={{borderRadius:8,marginBottom:4,overflow:"hidden",border:"1px solid",borderColor:open?"#6366f1":"#1f2937"}}>
                    <div onClick={()=>setOpenPor(open?null:p.name)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",cursor:"pointer",background:open?"rgba(99,102,241,0.08)":"transparent"}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,flex:1}}>
                        <div style={{width:28,height:6,borderRadius:99,background:C[i%C.length],flexShrink:0}}/>
                        <span style={{fontSize:13,color:"#e2e8f0"}}>{p.name}</span>
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <span style={{fontSize:14,fontWeight:700,color:C[i%C.length]}}>{p.count}</span>
                        <span style={{color:"#475569",fontSize:12}}>{open?"▲":"▼"}</span>
                      </div>
                    </div>
                    {open && (
                      <div style={{borderTop:"1px solid #1f2937",background:"#0f172a"}}>
                        {p.items.map((it,j)=>(
                          <div key={j} style={{padding:"8px 14px 8px 50px",borderBottom:"1px solid #1f2937",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                            <span style={{fontSize:12,color:"#94a3b8"}}>{it.t}</span>
                            <span style={{fontSize:13,fontWeight:700,color:C[i%C.length],flexShrink:0,marginLeft:8}}>{it.n}×</span>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
            <div style={css.card}>
              <div style={css.cardTitle}>Co děláme / Plánujeme</div>
              {INITIATIVES.map((ini,i)=>(
                <div key={i} style={{background:"#0f172a",borderRadius:10,padding:"12px 14px",marginBottom:10,border:"1px solid #1f2937"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                    <span style={{fontSize:13,fontWeight:700,color:"#f1f5f9"}}>{ini.topic}</span>
                    <span style={{fontSize:10,fontWeight:700,color:ini.statusColor,background:ini.statusColor+"22",borderRadius:99,padding:"3px 8px",flexShrink:0,marginLeft:8}}>{ini.status}</span>
                  </div>
                  <div style={{fontSize:12,color:"#9ca3af",marginBottom:6}}>{ini.desc}</div>
                  <div style={{fontSize:11,color:"#6366f1",background:"rgba(99,102,241,0.1)",borderRadius:6,padding:"5px 10px"}}>→ {ini.next}</div>
                </div>
              ))}
            </div>
          </div>
        </>}

        {tab==="problémy" && <>
          <div style={css.grid2eq}>
            <div style={{...css.card,background:"rgba(239,68,68,0.07)",border:"1px solid rgba(239,68,68,0.2)"}}>
              <div style={{...css.cardTitle,color:"#fca5a5"}}>Negativní sentiment</div>
              <div style={{fontSize:40,fontWeight:800,color:"#f87171",marginBottom:4}}>16</div>
              <div style={{fontSize:11,color:"#9ca3af",marginBottom:16}}>z 2 531 interakcí (1 %)</div>
              {[{name:"Email SK",total:123,neg:13},{name:"Email CZ",total:471,neg:9},{name:"CZ Reklamace",total:178,neg:7},{name:"CZ Objednávky",total:498,neg:6},{name:"SK Reklamace",total:33,neg:5},{name:"CZ Poradenství",total:1059,neg:3}].map(q=>(
                <div key={q.name} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <span style={{fontSize:13,color:"#9ca3af"}}>{q.name}</span>
                  <div><span style={{fontSize:14,fontWeight:700,color:"#fca5a5"}}>{q.neg}×</span><span style={{fontSize:11,color:"#475569",marginLeft:6}}>({pct(q.neg,q.total)} %)</span></div>
                </div>
              ))}
            </div>
            <div style={css.card}>
              <div style={css.cardTitle}>Systémové problémy</div>
              {ISSUES.map((p,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",borderRadius:8,marginBottom:6,background:p.bg,border:`1px solid ${p.bc}`}}>
                  <span style={{fontSize:13,color:p.c}}>{p.t}</span>
                  <div style={{marginLeft:8,flexShrink:0}}><span style={{fontSize:16,fontWeight:800,color:p.c}}>{p.n}×</span><span style={{fontSize:11,color:p.c,opacity:0.6,marginLeft:3}}>{p.tr}</span></div>
                </div>
              ))}
            </div>
          </div>
          <div style={css.card}>
            <div style={css.cardTitle}>Prioritizace — co řešit</div>
            {PRIO.map((p,i)=>(
              <div key={i} style={{borderRadius:12,padding:"14px 16px",marginBottom:10,borderLeft:`4px solid ${p.bc}`,background:p.bg}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                  <span style={{fontSize:11,fontWeight:700,color:"#9ca3af"}}>{p.badge}</span>
                  <span style={{fontSize:14,fontWeight:700,color:"#f1f5f9"}}>{p.title}</span>
                </div>
                <div style={{fontSize:12,color:"#9ca3af",marginBottom:6}}>{p.desc}</div>
                <span style={{fontSize:11,background:"rgba(99,102,241,0.15)",color:"#a5b4fc",padding:"5px 10px",borderRadius:6,display:"inline-block"}}>→ {p.action}</span>
              </div>
            ))}
          </div>
        </>}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
