.m-btn{padding:5px 12px;border-radius:6px;border:1px solid #e2e5ef;background:transparent;color:#6b7280;font-size:12px;transition:all .15s}
.m-btn:hover{border-color:#5b6ef5;color:#5b6ef5}
.m-btn.active{background:#5b6ef5;border-color:#5b6ef5;color:#fff}
.m-add{padding:5px 12px;border-radius:6px;border:1px dashed #d1d5e0;background:transparent;color:#6b7280;font-size:12px}

.tabs{display:flex;gap:2px;background:#fff;border-bottom:1px solid #e2e5ef;padding:0 24px}

.tab.active{border-bottom-color:#5b6ef5;color:#5b6ef5}
.body{padding:24px;max-width:1400px}

.g2eq{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}

.ctitle{font-size:10px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:14px}

.agent-tbl{width:100%;border-collapse:collapse;font-size:12px}
.agent-tbl th{text-align:left;padding:7px 10px;color:#6b7280;font-size:10px;text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid #e2e5ef;font-weight:600}

.row-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #e2e5ef}

.btn-primary{background:#5b6ef5;color:#fff;border:none;border-radius:6px;padding:8px 16px;font-size:12px;font-weight:500}
.btn-secondary{background:transparent;color:#6b7280;border:1px solid #d1d5e0;border-radius:6px;padding:8px 16px;font-size:12px}
</style>
</head>

const pct=(v,t)=>t?Math.round(v/t*100):0;

function aggregateAll(){
  // Merge all months into one synthetic month object
  const all=JSON.parse(JSON.stringify(months[0]));
  all.label='Všechny měsíce'; all.short='Celkem'; all.period=months.map(m=>m.short).join(' + ');
  // kpi
  all.kpi={total:0,pos:0,neu:0,neg:0,por:0};
  months.forEach(m=>{all.kpi.total+=m.kpi.total;});
  // pos/neu/neg as weighted avg
  const tot=all.kpi.total||1;
  months.forEach(m=>{all.kpi.pos+=m.kpi.pos*(m.kpi.total/tot);all.kpi.neu+=m.kpi.neu*(m.kpi.total/tot);all.kpi.neg+=m.kpi.neg*(m.kpi.total/tot);all.kpi.por+=m.kpi.por*(m.kpi.total/tot);});
  all.kpi.pos=Math.round(all.kpi.pos); all.kpi.neu=Math.round(all.kpi.neu); all.kpi.neg=Math.round(all.kpi.neg); all.kpi.por=Math.round(all.kpi.por);
  // sentiment
  all.sentiment=[{name:"Pozitivní",value:0},{name:"Neutrální",value:0},{name:"Negativní",value:0}];
  months.forEach(m=>m.sentiment.forEach((s,i)=>{all.sentiment[i].value+=s.value;}));
  // cats - merge by name
  const catMap={};
  months.forEach(m=>(m.cats||[]).forEach(c=>{catMap[c.name]=(catMap[c.name]||0)+c.n;}));
  all.cats=Object.entries(catMap).sort((a,b)=>b[1]-a[1]).map(([name,n])=>({name,n}));
  // czsk
  const czMap={};
  months.forEach(m=>(m.czsk||[]).forEach(x=>{czMap[x.name]=(czMap[x.name]||0)+x.total;}));
  const czTot=Object.values(czMap).reduce((s,v)=>s+v,0)||1;
  all.czsk=Object.entries(czMap).map(([name,total])=>({name,total,pct:Math.round(total/czTot*100)}));
  // weekly - flatten all weeks from all months
  all.weekly=months.flatMap(m=>(m.weekly||[]).map(w=>({...w,w:m.short+' '+w.w})));
  // reklamace - merge cases and byType
  const rekByType={};const rekByAgent={};let rekTotal=0;
  months.forEach(m=>{
    rekTotal+=m.reklamace?.total||0;
    (m.reklamace?.byType||[]).forEach(t=>{rekByType[t.name]=(rekByType[t.name]||0)+t.count;});
    (m.reklamace?.byAgent||[]).forEach(a=>{
      if(!rekByAgent[a.name])rekByAgent[a.name]={total:0,cases:[]};
      rekByAgent[a.name].total+=a.total;
      rekByAgent[a.name].cases=[...(rekByAgent[a.name].cases||[]),...(a.cases||[])];
    });
  });
  const rekColors=["#A32D2D","#854F0B","#634ABF","#185FA5","#5b6ef5","#0F6E56","#73726c"];
  all.reklamace={
    total:rekTotal,
    byType:Object.entries(rekByType).sort((a,b)=>b[1]-a[1]).map(([name,count],i)=>({name,count,color:rekColors[i%rekColors.length]})),
    byAgent:Object.entries(rekByAgent).sort((a,b)=>b[1].total-a[1].total).map(([name,v])=>({name,total:v.total,cases:v.cases})),
    notes:months[0].reklamace?.notes||[]
  };
  all.problémy=months[0].problémy; // problémy jsou globální
  return all;
}

function getActiveData(){
  return viewMode==='all' ? aggregateAll() : months[activeMonth];
}

function dc(){Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}});charts={};}

function render(){
  dc();
  const D=getActiveData();
  document.getElementById('app').innerHTML=html(D);
  bind(D);
  setTimeout(()=>buildCharts(D),80);
}

    const cw=g('cct');if(cw)charts.cw=new Chart(cw,{type:'bar',data:{labels:D.weekly.map(w=>w.w),datasets:[{label:'Poradenství',data:D.weekly.map(w=>w.por),backgroundColor:'#5b6ef5'},{label:'Objednávky',data:D.weekly.map(w=>w.obj),backgroundColor:'#0F6E56'},{label:'Reklamace',data:D.weekly.map(w=>w.rek),backgroundColor:'#A32D2D'}]},options:{...base,scales:{x:{stacked:true,grid:{display:false},ticks:{color:tc,font:{size:11}}},y:{stacked:true,grid:{color:gc},ticks:{color:tc,font:{size:11}}}}}});

  }

// ── EVENTS ───────────────────────────────────────────────────
function bind(D){
  document.querySelectorAll('.m-btn[data-mi]').forEach(b=>b.addEventListener('click',()=>{activeMonth=+b.dataset.mi;viewMode='month';render()}));
  const bva=document.getElementById('btn-viewall');
  if(bva)bva.addEventListener('click',()=>{viewMode='all';render()});
  document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>{activeTab=b.dataset.tab;openObj=null;openPor=null;openSub=null;openAgent=null;render()}));
  const bu=document.getElementById('btn-upload');
  if(bu)bu.addEventListener('click',()=>{showUpload=!showUpload;render()});
  const ba=document.getElementById('btn-am');
  if(ba)ba.addEventListener('click',addMonth);
  document.querySelectorAll('[data-agent]').forEach(b=>b.addEventListener('click',()=>{const n=b.dataset.agent;openAgent=openAgent===n?null:n;render()}));
  document.querySelectorAll('[data-obj]').forEach(b=>b.addEventListener('click',()=>{const n=b.dataset.obj;openObj=openObj===n?null:n;render()}));
  document.querySelectorAll('[data-por]').forEach(b=>b.addEventListener('click',()=>{const n=b.dataset.por;openPor=openPor===n?null:n;openSub=null;render()}));
  document.querySelectorAll('[data-sub]').forEach(b=>b.addEventListener('click',()=>{const n=b.dataset.sub;openSub=openSub===n?null:n;render()}));
  const uz=document.getElementById('uz'),fi=document.getElementById('fi');
  if(uz){uz.addEventListener('click',()=>fi.click());uz.addEventListener('dragover',e=>{e.preventDefault();uz.classList.add('drag')});uz.addEventListener('dragleave',()=>uz.classList.remove('drag'));uz.addEventListener('drop',e=>{e.preventDefault();uz.classList.remove('drag');loadFile(e.dataTransfer.files[0])});}
  if(fi)fi.addEventListener('change',e=>loadFile(e.target.files[0]));
}

// ── PROBLÉM DETAIL ───────────────────────────────────────────
function toggleDetail(id){
  const el=document.getElementById('det-'+id);
  if(el)el.style.display=el.style.display==='none'?'block':'none';
}

function addComment(id){
  const ta=document.getElementById('cmt-'+id);
  if(!ta||!ta.value.trim())return;
  const D=months[activeMonth];
  const p=D.problémy.find(x=>x.id===id);
  if(!p)return;
  const now=new Date();
  const date=now.getDate()+'.'+(now.getMonth()+1)+'.'+now.getFullYear();
  p.comments.push({author:"Já",date,text:ta.value.trim()});
  render();
  setTimeout(()=>{
    toggleDetail(id);
    const det=document.getElementById('det-'+id);
    if(det)det.style.display='block';
  },50);
}

function editStatus(id){
  const D=months[activeMonth];
  const p=D.problémy.find(x=>x.id===id);
  if(!p)return;
  const opts=['open','progress','done'];
  const labels=['Otevřený','V řešení','Vyřešeno'];
  const cur=opts.indexOf(p.status);
  const next=(cur+1)%3;
  p.status=opts[next];
  render();
}

function openNewProblem(){
  const mr=document.getElementById('modal-root');
  mr.innerHTML=`<div class="modal-bg" id="mbg">
    <div class="modal">
      <h3>+ Přidat nový problém</h3>
      <label>Název problému</label><input id="np-title" placeholder="např. Chybějící produkty ve skladu">
      <label>Závažnost</label>
      <select id="np-level"><option value="KRITICKÉ">🔴 Kritické</option><option value="DŮLEŽITÉ" selected>🟡 Důležité</option><option value="SLEDOVAT">🟢 Sledovat</option></select>
      <label>Frekvence</label><input id="np-freq" placeholder="např. 10× / měsíc">
      <label>Popis</label><textarea id="np-desc" placeholder="Co se děje?"></textarea>
      <label>Navrhovaná akce</label><input id="np-action" placeholder="Kdo co udělá?">
      <label>Zodpovědná osoba / tým</label><input id="np-owner" placeholder="např. IT tým">
      <label>Fakta na stole (každé na nový řádek)</label><textarea id="np-facts" placeholder="Fakt 1&#10;Fakt 2"></textarea>
      <div class="modal-btns">
        <button class="btn-secondary" onclick="closeModal()">Zrušit</button>
        <button class="btn-primary" onclick="saveNewProblem()">Přidat</button>
      </div>
    </div>
  </div>`;
  document.getElementById('mbg').addEventListener('click',e=>{if(e.target.id==='mbg')closeModal();});
}

function saveNewProblem(){
  const title=document.getElementById('np-title').value.trim();
  if(!title)return alert('Zadej název problému');
  const lvl=document.getElementById('np-level').value;
  const colors={KRITICKÉ:"#A32D2D",DŮLEŽITÉ:"#854F0B",SLEDOVAT:"#0F6E56"};
  const facts=document.getElementById('np-facts').value.split('\n').map(s=>s.trim()).filter(Boolean);
  months[activeMonth].problémy.push({
    id:'p'+Date.now(),level:lvl,color:colors[lvl],
    title,freq:document.getElementById('np-freq').value||'?× / měsíc',
    desc:document.getElementById('np-desc').value,
    action:document.getElementById('np-action').value,
    owner:document.getElementById('np-owner').value||'Nezadáno',
    status:'open',facts,comments:[]
  });
  closeModal();render();
}

function closeModal(){document.getElementById('modal-root').innerHTML='';}

// ── PŘIDAT MĚSÍC ─────────────────────────────────────────────
function addMonth(){
  const name=prompt('Název měsíce (např. Duben 2026):');
  if(!name)return;
  const short=name.split(' ').map(w=>w.slice(0,3)).join(' ');
  const blank=JSON.parse(JSON.stringify(MARCH));
  blank.label=name;blank.short=short;blank.period=name;
  blank.kpi={total:0,pos:0,neu:0,neg:0,por:0};
  blank.weekly=[];
  months.push(blank);
  activeMonth=months.length-1;
  showUpload=true;
  render();
}

// ── CSV NAČÍTÁNÍ ──────────────────────────────────────────────
function loadFile(file){
  if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    const text=e.target.result;
    const lines=text.trim().split(/\r?\n/);
    const hdrs=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
    const rows=lines.slice(1).filter(l=>l.trim()).map(line=>{
      const v=line.split(',').map(x=>x.trim().replace(/^"|"$/g,''));
      const o={};hdrs.forEach((h,i)=>o[h]=v[i]||'');return o;
    });
    // detect type by headers
    if(hdrs.includes('Sklad')||hdrs.includes('Agent')){
      const bt={},ba={};
      const EXCLUDED=['Anna Soumarová','Neznámý',''];
      rows.forEach(row=>{
        const typ=row['Sklad']||'Ostatní';
        const ag=row['Agent']||'Neznámý';
        bt[typ]=(bt[typ]||0)+1;
        if(EXCLUDED.includes(ag))return;
        if(!ba[ag])ba[ag]={total:0,cases:[]};
        ba[ag].total++;
        ba[ag].cases.push({
          id:row['Číslo případu']||'',
          zakaznik:row['Jméno zákazníka']||'',
          objednavka:row['Číslo objednávky']||'',
          typ,
          detail:row['Jiné']||''
        });
      });
      const colors=["#A32D2D","#854F0B","#634ABF","#185FA5","#5b6ef5","#0F6E56","#73726c"];
      const byType=Object.entries(bt).sort((a,b)=>b[1]-a[1]).map(([name,count],i)=>({name,count,color:colors[i%colors.length]}));
      const byAgent=Object.entries(ba).sort((a,b)=>b[1].total-a[1].total).map(([name,vals])=>({name,total:vals.total,cases:vals.cases}));
      months[activeMonth].reklamace={total:rows.length,byType,byAgent,notes:months[activeMonth].reklamace.notes||[]};
      showUpload=false;activeTab="reklamace";render();
    } else if(hdrs.includes('Kategorie')||hdrs.includes('Celkem')||hdrs.includes('Pozitivní')){
      // měsíční souhrn CSV
      const row=rows[0]||{};
      months[activeMonth].kpi={
        total:+row['Celkem']||0,pos:+row['Pozitivní']||0,
        neu:+row['Neutrální']||0,neg:+row['Negativní']||0,por:+row['Poradenství %']||0
      };
      showUpload=false;alert('✓ KPI data načtena');render();
    } else {
      alert('Nepodporovaný formát. Stáhni šablonu pro správný formát.');
    }
  };
  r.readAsText(file,'utf-8');
}
